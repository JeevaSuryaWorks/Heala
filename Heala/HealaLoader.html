<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heala - Your health, your way</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #1a0a2e 0%, #2d1150 40%, #1a0a2e 100%);
            font-family: 'Nunito', sans-serif;
        }

        /* Starfield */
        .star {
            position: absolute;
            background: #f5d0fe;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) ease-in-out infinite var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.4); }
        }

        /* DNA Ribbons */
        .dna-column {
            position: absolute;
            width: 36px;
            height: 200px;
            opacity: 0.5;
            animation: float 4s ease-in-out infinite;
        }

        .dna-left { left: 40px; }
        .dna-right { right: 40px; transform: scaleX(-1); }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Main Loader Container */
        .loader-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Concentric Rings */
        .ring-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border-width: 2px;
            border-style: solid;
            border-color: transparent;
        }

        .ring-outer {
            width: 220px;
            height: 220px;
            border-top-color: #f0abfc;
            border-right-color: #e879f9;
            animation: spin 5s linear infinite;
        }

        .ring-mid {
            width: 188px;
            height: 188px;
            border-top-color: #fbcfe8;
            border-left-color: #f9a8d4;
            animation: spin 3.5s linear infinite reverse;
        }

        .ring-inner {
            width: 156px;
            height: 156px;
            border-top-color: #c4b5fd;
            border-right-color: #a78bfa;
            animation: spin 7s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Pulsing Core Orb */
        .core-orb {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 35%, #fce7f3 0%, #f0abfc 45%, #c084fc 75%, #7c3aed 100%);
            box-shadow: 0 0 40px rgba(192, 132, 252, 0.5), 0 0 80px rgba(192, 132, 252, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            animation: pulse-orb 2.4s ease-in-out infinite;
        }

        @keyframes pulse-orb {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(192, 132, 252, 0.5), 0 0 80px rgba(192, 132, 252, 0.2); }
            50% { transform: scale(1.06); box-shadow: 0 0 60px rgba(192, 132, 252, 0.7), 0 0 100px rgba(192, 132, 252, 0.4); }
        }

        /* Heartbeat */
        .heart-icon {
            width: 50px;
            height: 50px;
            animation: heartbeat 1.2s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.18); }
            28% { transform: scale(1); }
            42% { transform: scale(1.12); }
            70% { transform: scale(1); }
        }

        /* Orbiting Petals */
        .petal {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50% 0 50% 0;
            opacity: 0.7;
            animation: orbit 7.2s linear infinite, petal-pop 2.4s ease-in-out infinite;
        }

        @keyframes orbit {
            from { transform: rotate(var(--angle)) translateX(100px) rotate(calc(-1 * var(--angle))); }
            to { transform: rotate(calc(var(--angle) + 360deg)) translateX(100px) rotate(calc(-1 * (var(--angle) + 360deg))); }
        }

        @keyframes petal-pop {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Flying Sparkles */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff;
            opacity: 0;
            animation: sparkle-fly var(--duration) ease-out infinite var(--delay);
        }

        @keyframes sparkle-fly {
            0% { transform: translate(0, 0) scale(0); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 0.8; }
            100% { transform: translate(var(--sx), var(--sy)) scale(1.2); opacity: 0; }
        }

        /* Text Block */
        .text-block {
            margin-top: 40px;
            text-align: center;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 500;
            font-size: 52px;
            background: linear-gradient(to right, #fce7f3, #f0abfc, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
            animation: name-shimmer 3s ease-in-out infinite;
        }

        @keyframes name-shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .tagline {
            font-size: 13px;
            font-weight: 700;
            color: #d8b4fe;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
            margin-bottom: 28px;
        }

        /* Progress Bar */
        .progress-container {
            width: 220px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            position: relative;
            overflow: visible;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f9a8d4, #e879f9, #c084fc);
            border-radius: 3px;
            position: relative;
            animation: load-bar 3.2s cubic-bezier(.4, 0, .2, 1) forwards;
        }

        .progress-dot {
            position: absolute;
            right: -6px;
            top: -3px;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #e879f9;
        }

        @keyframes load-bar {
            0% { width: 0%; }
            40% { width: 72%; }
            80% { width: 90%; }
            100% { width: 100%; }
        }

        /* Cycling Status */
        .status-wrapper {
            height: 20px;
            overflow: hidden;
            margin-top: 15px;
        }

        .status-list {
            display: flex;
            flex-direction: column;
            animation: cycle-up 3.2s steps(1) forwards;
        }

        .status-text {
            height: 20px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        @keyframes cycle-up {
            0% { transform: translateY(0); }
            33% { transform: translateY(-20px); }
            66% { transform: translateY(-40px); }
            100% { transform: translateY(-40px); }
        }

        /* Specialty Pills */
        .pills-container {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 12px;
        }

        .pill {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(240, 171, 252, 0.3);
            background: rgba(192, 132, 252, 0.12);
            color: #f5d0fe;
            animation: pill-float var(--dur) ease-in-out infinite var(--del);
        }

        @keyframes pill-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

    </style>
</head>
<body>

    <!-- Starfield will be injected here -->
    <div id="starfield"></div>

    <!-- DNA Decorations -->
    <div class="dna-column dna-left">
        <svg viewBox="0 0 36 200">
            <line x1="4" y1="20" x2="4" y2="170" stroke="#ff00ff" stroke-width="1.5" opacity="0.4" />
            <line x1="32" y1="20" x2="32" y2="170" stroke="#ff00ff" stroke-width="1.5" opacity="0.4" />
            <ellipse cx="18" cy="20" rx="14" ry="5" fill="none" stroke="#f9a8d4" stroke-width="2" />
            <ellipse cx="18" cy="50" rx="14" ry="5" fill="none" stroke="#e879f9" stroke-width="2" />
            <ellipse cx="18" cy="80" rx="14" ry="5" fill="none" stroke="#f9a8d4" stroke-width="2" />
            <ellipse cx="18" cy="110" rx="14" ry="5" fill="none" stroke="#e879f9" stroke-width="2" />
            <ellipse cx="18" cy="140" rx="14" ry="5" fill="none" stroke="#f9a8d4" stroke-width="2" />
            <ellipse cx="18" cy="170" rx="14" ry="5" fill="none" stroke="#e879f9" stroke-width="2" />
        </svg>
    </div>
    <div class="dna-column dna-right">
        <svg viewBox="0 0 36 200">
            <line x1="4" y1="20" x2="4" y2="170" stroke="#ff00ff" stroke-width="1.5" opacity="0.4" />
            <line x1="32" y1="20" x2="32" y2="170" stroke="#ff00ff" stroke-width="1.5" opacity="0.4" />
            <ellipse cx="18" cy="20" rx="14" ry="5" fill="none" stroke="#f9a8d4" stroke-width="2" />
            <ellipse cx="18" cy="50" rx="14" ry="5" fill="none" stroke="#e879f9" stroke-width="2" />
            <ellipse cx="18" cy="80" rx="14" ry="5" fill="none" stroke="#f9a8d4" stroke-width="2" />
            <ellipse cx="18" cy="110" rx="14" ry="5" fill="none" stroke="#e879f9" stroke-width="2" />
            <ellipse cx="18" cy="140" rx="14" ry="5" fill="none" stroke="#f9a8d4" stroke-width="2" />
            <ellipse cx="18" cy="170" rx="14" ry="5" fill="none" stroke="#e879f9" stroke-width="2" />
        </svg>
    </div>

    <div class="loader-container">
        <!-- Orbiting Sparkles -->
        <div id="sparkle-layer"></div>

        <div class="ring-container">
            <div class="ring ring-outer"></div>
            <div class="ring ring-mid"></div>
            <div class="ring ring-inner"></div>

            <!-- Petals -->
            <div id="petals"></div>

            <div class="core-orb">
                <svg class="heart-icon" viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#f9a8d4;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#e879f9;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <path d="M50 88.9L42.8 82.4C17.1 59.1 0 43.6 0 26.7C0 11.8 11.8 0 26.7 0C35.1 0 43.2 3.9 48.5 10C53.8 3.9 61.9 0 70.3 0C85.2 0 97 11.8 97 26.7C97 43.6 79.9 59.1 54.2 82.4L50 88.9Z" fill="white" fill-opacity="0.95" />
                    <path d="M50 88.9L42.8 82.4C17.1 59.1 0 43.6 0 26.7C0 11.8 11.8 0 26.7 0C35.1 0 43.2 3.9 48.5 10C53.8 3.9 61.9 0 70.3 0C85.2 0 97 11.8 97 26.7C97 43.6 79.9 59.1 54.2 82.4L50 88.9Z" fill="url(#heartGradient)" />
                    <polyline points="20,45 35,45 42,25 50,65 58,45 75,45" fill="none" stroke="#c084fc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>
        </div>

        <div class="text-block">
            <h1 class="brand-name">Heala</h1>
            <p class="tagline">Your health, your way</p>

            <div class="progress-container">
                <div class="progress-fill">
                    <div class="progress-dot"></div>
                </div>
            </div>

            <div class="status-wrapper">
                <div class="status-list">
                    <div class="status-text">Finding the best doctors for you…</div>
                    <div class="status-text">Personalizing your experience…</div>
                    <div class="status-text">Almost ready ✦</div>
                </div>
            </div>
        </div>
    </div>

    <div class="pills-container">
        <div class="pill" style="--dur: 2s; --del: 0s;">Cardiology</div>
        <div class="pill" style="--dur: 2.3s; --del: 0.5s;">Wellness</div>
        <div class="pill" style="--dur: 1.8s; --del: 0.2s;">Skincare</div>
        <div class="pill" style="--dur: 2.5s; --del: 0.8s;">Mental Health</div>
    </div>

    <script>
        // Generate Starfield
        const starfield = document.getElementById('starfield');
        const starCount = 60;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.setProperty('--duration', `${Math.random() * 3 + 1.5}s`);
            star.style.setProperty('--delay', `${Math.random() * 5}s`);
            starfield.appendChild(star);
        }

        // Generate Petals
        const petalsContainer = document.getElementById('petals');
        const petalColors = ['#f9a8d4', '#e879f9', '#c084fc', '#d8b4fe', '#fce7f3'];
        for (let i = 0; i < 8; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.background = petalColors[i % petalColors.length];
            petal.style.setProperty('--angle', `${i * 45}deg`);
            petal.style.animationDelay = `${i * 0.9}s, 0s`;
            petalsContainer.appendChild(petal);
        }

        // Generate Sparkles
        const sparkleLayer = document.getElementById('sparkle-layer');
        const sparkleCount = 12;
        const sparkleColors = ['#f9a8d4', '#e879f9', '#c084fc', '#d8b4fe'];
        for (let i = 0; i < sparkleCount; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const color = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
            sparkle.style.background = color;
            
            const radius = 150 + Math.random() * 100;
            const angle = Math.random() * Math.PI * 2;
            const sx = Math.cos(angle) * radius;
            const sy = Math.sin(angle) * radius;
            
            sparkle.style.setProperty('--sx', `${sx}px`);
            sparkle.style.setProperty('--sy', `${sy}px`);
            sparkle.style.setProperty('--duration', `${Math.random() * 2.5 + 2}s`);
            sparkle.style.setProperty('--delay', `${Math.random() * 4}s`);
            sparkleLayer.appendChild(sparkle);
        }
    </script>
</body>
</html>
